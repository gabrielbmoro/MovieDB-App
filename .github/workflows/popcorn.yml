name: Popcorn

on:
  pull_request:
    branches: ["main"]
    paths:
      - "**/build-logic/**"
      - "**.kts"
      - "**/popcorn.yml"

jobs:
  popcorn:
    runs-on: ubuntu-latest
    env:
      MOVIE_DB_API_TOKEN: ${{ secrets.MOVIE_DB_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java
        uses: ./.github/actions/java

      - name: Grant execute permission for gradlew
        working-directory: ./src
        run: chmod +x gradlew

      - name: Run Popcorn
        uses: CodandoTV/popcorn-guineapig/.github/actions/popcorn@feature/error-report-fix
        with:
          working-directory: .
